<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📦 까대기 스캔</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
    .header{background:#1a73e8;color:#fff;padding:14px 20px;font-size:18px;font-weight:600;position:sticky;top:0;z-index:100}
    .container{padding:12px;max-width:500px;margin:0 auto}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .card h3{font-size:15px;margin-bottom:10px;color:#1a73e8}
    #reader{width:100%;border-radius:10px;overflow:hidden;margin-bottom:10px}
    .scan-input{width:100%;padding:14px;font-size:18px;font-weight:600;border:3px solid #1a73e8;border-radius:10px;outline:none;text-align:center;background:#f0f7ff}
    .scan-input:focus{border-color:#0d47a1;background:#fff}
    .btn{width:100%;padding:14px;margin-top:8px;font-size:17px;font-weight:700;color:#fff;border:none;border-radius:10px;cursor:pointer}
    .btn:active{transform:scale(.98)}
    .btn-blue{background:#1a73e8}
    .btn-green{background:#0d904f}
    .btn:disabled{background:#ccc}
    .result{display:none;margin-top:12px}.result.show{display:block}
    .result-card{border-radius:12px;padding:14px;margin-bottom:8px;border:2px solid}
    .result-card.ok{border-color:#0d904f;background:#f0fdf4}
    .result-card.warn{border-color:#e37400;background:#fffbeb}
    .result-card.info{border-color:#1a73e8;background:#e8f0fe}
    .result-card b{font-size:15px}
    .result-card p{font-size:13px;color:#555;margin-top:6px;line-height:1.5}
    .hint{font-size:11px;color:#999;text-align:center;margin-top:6px}
    .scan-count{background:#fff;border-radius:10px;padding:10px;text-align:center;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .scan-count .num{font-size:28px;font-weight:700;color:#1a73e8}
    .scan-count .txt{font-size:12px;color:#888}
    .loading{text-align:center;padding:15px;color:#888}
    .spinner{width:24px;height:24px;border:3px solid #e8eaed;border-top-color:#1a73e8;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 8px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:300;display:none;max-width:85%;text-align:center}
    .toast.show{display:block;animation:fu .3s}
    @keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
    .history{margin-top:4px}
    .history-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
    .history-item .num{font-weight:600;color:#333}
    .history-item .status{font-size:12px}
    .status-ok{color:#0d904f}.status-warn{color:#e37400}
  </style>
</head>
<body>
  <div class="header">📦 까대기 스캔</div>
  <div class="container">

    <!-- 모드 선택 -->
    <div class="card">
      <div style="display:flex;gap:8px">
        <button class="btn btn-blue" id="btnModeA" onclick="setMode('batch')" style="flex:1;padding:10px;font-size:14px">A. 합배송</button>
        <button class="btn" id="btnModeB" onclick="setMode('single')" style="flex:1;padding:10px;font-size:14px;background:#888">B. 일괄</button>
      </div>
    </div>

    <!-- 스캔 카운터 -->
    <div class="scan-count">
      <div class="num" id="scanCount">0</div>
      <div class="txt">오늘 스캔</div>
    </div>

    <!-- 배치 스캔 목록 (A모드 전용) -->
    <div class="card" id="batchCard" style="display:none">
      <h3>📦 합배송 스캔 목록 (<span id="batchNum">0</span>건)</h3>
      <div id="batchList" style="margin-bottom:10px"></div>
      <button class="btn btn-green" onclick="sendBatch()" id="batchSendBtn" disabled>스캔 완료 → 일괄 전송</button>
    </div>

    <!-- 바코드 스캔 -->
    <div class="card">
      <h3>운송장 바코드 스캔</h3>
      <div id="reader"></div>
      <input type="text" class="scan-input" id="scanInput" placeholder="직접 입력" autocomplete="off" inputmode="numeric">
      <button class="btn btn-blue" onclick="doScan()">입력완료</button>
      <div class="hint">바코드 스캔 또는 직접 입력 → 구글 시트에서 작업</div>
    </div>

    <!-- 결과 -->
    <div class="result" id="resultArea"></div>

    <!-- 스캔 이력 -->
    <div class="card">
      <h3>스캔 이력</h3>
      <div class="history" id="history">
        <div style="text-align:center;color:#ccc;padding:10px">스캔 이력이 없습니다</div>
      </div>
    </div>

  </div>
  <div id="toast" class="toast"></div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxkNDf2iq0pgaQsgmZcuhShUP07XnNdS53CMfwN5712z853qz39DafFb5_ItbhGROum/exec';
    var scanHistory = [];
    var scannerPaused = false;
    var scanMode = localStorage.getItem('scanMode') || 'single'; // 'batch' or 'single'
    var batchScans = []; // A모드 배치 목록

    // ── 모드 전환 ──
    function setMode(mode) {
      scanMode = mode;
      localStorage.setItem('scanMode', mode);
      document.getElementById('btnModeA').className = mode === 'batch' ? 'btn btn-blue' : 'btn';
      document.getElementById('btnModeB').className = mode === 'single' ? 'btn btn-blue' : 'btn';
      document.getElementById('btnModeA').style.background = mode === 'batch' ? '' : '#888';
      document.getElementById('btnModeB').style.background = mode === 'single' ? '' : '#888';
      document.getElementById('batchCard').style.display = mode === 'batch' ? 'block' : 'none';
      if (mode === 'single') { batchScans = []; renderBatchList(); }
    }
    setMode(scanMode); // 초기화

    // ── 바코드 스캐너 ──
    var html5Qr = new Html5Qrcode("reader", {
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.ITF,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.CODABAR,
      ],
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
    });

    function startScanner() {
      scannerPaused = false;
      var w = document.getElementById('reader').clientWidth || 340;
      html5Qr.start(
        { facingMode: "environment" },
        { fps: 15, qrbox: { width: Math.min(Math.floor(w*0.9), 500), height: 120 },
          aspectRatio: 16/9,
          videoConstraints: { facingMode:"environment", width:{ideal:1920}, height:{ideal:1080},
            advanced:[{focusMode:"continuous"}] } },
        function(text) {
          if (scannerPaused) return;
          var num = text.replace(/\D/g,'');
          if (num.length >= 8) {
            scannerPaused = true;
            html5Qr.pause(true);
            document.getElementById('scanInput').value = num;
            scanFeedback();
            handleScan(num);
          }
        },
        function(){}
      ).catch(function(e) {
        document.getElementById('reader').innerHTML =
          '<div style="padding:15px;text-align:center;color:#888">카메라 사용 불가 — 직접 입력하세요</div>';
      });
    }
    startScanner();

    // ── 입력완료 ──
    function doScan() {
      var num = document.getElementById('scanInput').value.trim().replace(/\D/g,'');
      if (num.length >= 8) { scanFeedback(); handleScan(num); }
      else toast('운송장번호를 확인하세요');
    }
    document.getElementById('scanInput').addEventListener('keydown', function(e) {
      if (e.key==='Enter') { e.preventDefault(); doScan(); }
    });

    // ── 모드별 스캔 핸들러 ──
    function handleScan(num) {
      if (scanMode === 'batch') {
        // A모드: 배치에 추가
        if (batchScans.indexOf(num) >= 0) {
          toast('이미 스캔한 운송장입니다');
          nextScan();
          return;
        }
        batchScans.push(num);
        renderBatchList();
        addHistory(num, '📦 배치 추가');
        toast('배치에 추가됨 (' + batchScans.length + '건)');
        // 즉시 스캐너 재개 (연속 스캔)
        setTimeout(nextScan, 800);
      } else {
        // B모드: 즉시 전송
        sendToSheet(num);
      }
    }

    // ── 배치 목록 렌더링 ──
    function renderBatchList() {
      var el = document.getElementById('batchList');
      var numEl = document.getElementById('batchNum');
      var btn = document.getElementById('batchSendBtn');
      numEl.textContent = batchScans.length;
      btn.disabled = batchScans.length === 0;
      if (batchScans.length === 0) {
        el.innerHTML = '<div style="text-align:center;color:#ccc;padding:8px;font-size:13px">운송장을 스캔하세요</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < batchScans.length; i++) {
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0">' +
          '<span style="font-weight:600;font-size:14px">' + (i+1) + '. ' + batchScans[i] + '</span>' +
          '<button onclick="removeBatch(' + i + ')" style="background:none;border:none;color:#e37400;font-size:18px;cursor:pointer">✕</button></div>';
      }
      el.innerHTML = html;
    }

    function removeBatch(idx) {
      batchScans.splice(idx, 1);
      renderBatchList();
    }

    // ── 배치 일괄 전송 (A모드) ──
    function sendBatch() {
      if (batchScans.length === 0) return;
      var area = document.getElementById('resultArea');
      area.className = 'result show';
      area.innerHTML = '<div class="loading"><div class="spinner"></div>' + batchScans.length + '건 일괄 전송 중...</div>';

      var worker = localStorage.getItem('worker') || '작업자';
      var nums = batchScans.join(',');

      fetch(GAS_URL + '?action=batchScan&nums=' + encodeURIComponent(nums) + '&worker=' + encodeURIComponent(worker))
        .then(function(r) { return r.text(); })
        .then(function(text) {
          var result;
          try { result = JSON.parse(text); } catch(e) { result = { error: text }; }

          if (result.error) {
            area.innerHTML = '<div class="result-card warn"><b>⚠️ 오류</b><p>' + result.error + '</p></div>';
            return;
          }

          var matched = result.matched || 0;
          var unmatched = result.unmatched || 0;
          area.innerHTML =
            '<div class="result-card ok"><b>📦 합배송 ' + batchScans.length + '건 처리 완료</b>' +
            '<p>매칭: ' + matched + '건 / 미매칭: ' + unmatched + '건</p></div>' +
            '<div class="result-card info"><p>📋 <b>컴퓨터 구글 시트</b>에서 그룹별 수량 입력</p></div>';
          addHistory(batchScans.length + '건 배치', '✅ 매칭 ' + matched + '건');
          batchScans = [];
          renderBatchList();
        })
        .catch(function(e) {
          area.innerHTML = '<div class="result-card warn"><b>네트워크 오류</b><p>' + e.message + '</p></div>';
        });
    }

    // ── GAS에 운송장 전송 (B모드: 단건) ──
    function sendToSheet(num) {
      var area = document.getElementById('resultArea');
      area.className = 'result show';
      area.innerHTML = '<div class="loading"><div class="spinner"></div>시트에 전송 중...</div>';

      var worker = localStorage.getItem('worker') || '작업자';

      var retryCount = 0;
      function doFetch() {
        fetch(GAS_URL + '?action=scan&num=' + encodeURIComponent(num) + '&worker=' + encodeURIComponent(worker))
          .then(function(r) { return r.text(); })
          .then(function(text) {
            var result;
            try { result = JSON.parse(text); } catch(e) { result = { error: text }; }

            if (result.error) {
              area.innerHTML = '<div class="result-card warn"><b>⚠️ 오류</b><p>' + result.error + '</p></div>';
              return;
            }

          if (result.status === 'matched') {
            area.innerHTML =
              '<div class="result-card ok"><b>✅ ' + result.items.length + '건 매칭 완료</b></div>' +
              '<div class="result-card info"><p>📋 <b>컴퓨터 구글 시트</b>에서 수량 입력 후 Z열 체크<br>📹 촬영 자동 시작됨</p></div>' +
              '<button class="btn btn-green" onclick="nextScan()">📦 다음 운송장 스캔</button>';
            addHistory(num, '✅ 매칭 ' + result.items.length + '건');
            setTimeout(nextScan, 3000);
          } else if (result.status === 'unmatched') {
            area.innerHTML =
              '<div class="result-card warn"><b>⚠️ 미등록 운송장</b><p>📋 <b>컴퓨터 구글 시트</b>에서 후보 확인</p></div>' +
              '<button class="btn btn-green" onclick="nextScan()">📦 다음 운송장 스캔</button>';
            addHistory(num, '⚠️ 미매칭');
            setTimeout(nextScan, 3000);
          }
        })
        .catch(function(e) {
          if (retryCount < 2) {
            retryCount++;
            area.innerHTML = '<div class="loading"><div class="spinner"></div>재시도 중 (' + retryCount + '/2)...</div>';
            setTimeout(doFetch, 2000);
          } else {
            area.innerHTML = '<div class="result-card warn"><b>네트워크 오류</b><p>' + e.message + '<br>인터넷 연결을 확인하세요</p></div>' +
              '<button class="btn btn-green" onclick="nextScan()">📦 다시 시도</button>';
          }
        });
      }
      doFetch();
    }

    // ── 다음 스캔 ──
    function nextScan() {
      document.getElementById('scanInput').value = '';
      document.getElementById('resultArea').className = 'result';
      scannerPaused = false;
      try {
        html5Qr.resume();
      } catch(e) {
        try { html5Qr.stop(); } catch(ex) {}
        setTimeout(startScanner, 500);
      }
    }

    // ── 스캔 이력 ──
    function addHistory(num, status) {
      var count = parseInt(document.getElementById('scanCount').textContent) + 1;
      document.getElementById('scanCount').textContent = count;

      scanHistory.unshift({ num: num, status: status, time: new Date().toLocaleTimeString('ko-KR') });
      renderHistory();
    }

    function renderHistory() {
      var html = '';
      scanHistory.slice(0, 10).forEach(function(h) {
        var cls = h.status.includes('✅') ? 'status-ok' : 'status-warn';
        html += '<div class="history-item"><span class="num">' + h.num + '</span>' +
                '<span class="' + cls + '">' + h.status + ' ' + h.time + '</span></div>';
      });
      document.getElementById('history').innerHTML = html || '<div style="text-align:center;color:#ccc;padding:10px">스캔 이력이 없습니다</div>';
    }

    // ── 유틸 ──
    function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
    function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}

    function scanFeedback() {
      try { navigator.vibrate([100, 50, 100]); } catch(e) {}
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 1200; gain.gain.value = 0.3;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }
  </script>
</body>
</html>
