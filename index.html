<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📹 검수 촬영</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;overflow:hidden}
    #camera{width:100vw;height:100vh;object-fit:cover;position:fixed;top:0;left:0}
    .top{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.6);padding:12px 16px;z-index:10;display:flex;justify-content:space-between;align-items:center}
    .info{font-size:14px;line-height:1.4}
    .info .lbl{color:#aaa;font-size:11px}
    .info .val{font-weight:600}
    .rec{display:none;background:#d93025;color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;align-items:center;gap:6px}
    .rec.on{display:flex}
    .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:p 1s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
    .bot{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);padding:20px 16px;z-index:10;text-align:center}
    .status{font-size:16px;font-weight:600;margin-bottom:8px}
    .sub{font-size:12px;color:#aaa}
    .timer{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;margin:8px 0}
    .conn{position:fixed;top:60px;right:16px;z-index:10;font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(0,0,0,.5)}
    .conn.ok{color:#0d904f}.conn.wait{color:#e37400}
  </style>
</head>
<body>
  <video id="camera" autoplay muted playsinline></video>
  <div class="top">
    <div class="info">
      <div class="lbl" id="lbl">대기 중</div>
      <div class="val" id="val">scan.html에서 운송장을 스캔하세요</div>
    </div>
    <div class="rec" id="rec"><div class="dot"></div>REC</div>
  </div>
  <div class="conn wait" id="conn">● 연결 대기중</div>
  <div class="bot">
    <div class="status" id="st">📹 카메라 준비 중...</div>
    <div class="timer" id="tm" style="display:none">00:00</div>
    <div class="sub" id="sb">scan.html에서 운송장 스캔 후 촬영이 자동 시작됩니다</div>
  </div>

  <script>
    // ── 설정 ──
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkNDf2iq0pgaQsgmZcuhShUP07XnNdS53CMfwN5712z853qz39DafFb5_ItbhGROum/exec';
    var SPREADSHEET_ID = '1nHJF8yzm5TaLOu7Od-OFfd5hglW7bDfdfDZLbhREwU0';

    var stream = null, recorder = null, chunks = [], timerInt = null, startTime = null, curOrder = null;

    // ── 카메라 ──
    async function initCamera() {
      try {
        // 기기 최대 해상도 + 최대 프레임레이트
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 4096 },
            height: { ideal: 2160 },
            frameRate: { ideal: 60 }
          },
          audio: false
        });
        var track = stream.getVideoTracks()[0];
        var settings = track.getSettings();
        document.getElementById('conn').textContent =
          '● ' + settings.width + 'x' + settings.height + ' ' + (settings.frameRate||30) + 'fps';
        document.getElementById('conn').className = 'conn ok';
        document.getElementById('camera').srcObject = stream;
        document.getElementById('st').textContent = '📹 대기 중';
        document.getElementById('sb').textContent = 'scan.html에서 운송장 스캔 후 촬영이 자동 시작됩니다';
        document.getElementById('conn').textContent = '● 카메라 준비됨';
        document.getElementById('conn').className = 'conn ok';
      } catch(e) {
        document.getElementById('st').textContent = '❌ 카메라 접근 실패';
        document.getElementById('sb').textContent = e.message;
      }
    }

    // ── 녹화 ──
    function startRec(order) {
      if (!stream || recorder) return;
      curOrder = order;
      chunks = [];
      // 기기 최대 화질: mp4 우선, 비트레이트 최대
      var mimeType = 'video/webm';
      var opts = [
        'video/mp4;codecs=avc1.640033',  // H.264 High Profile Level 5.1
        'video/mp4;codecs=avc1',
        'video/mp4',
        'video/webm;codecs=h264',
        'video/webm;codecs=vp9',
        'video/webm'
      ];
      for (var i = 0; i < opts.length; i++) {
        if (MediaRecorder.isTypeSupported(opts[i])) { mimeType = opts[i]; break; }
      }
      // 5Mbps — 1080p 고화질 + GAS 50MB 제한 이내 (1분=~37MB)
      recorder = new MediaRecorder(stream, { mimeType: mimeType, videoBitsPerSecond: 5000000 });
      recorder.ondataavailable = function(e) { if(e.data.size>0) chunks.push(e.data); };
      recorder.onstop = function() { saveVideo(new Blob(chunks,{type: lastMimeType || 'video/webm'})); };
      recorder.start(500);  // 500ms 간격 chunk (프레임 손실 최소화)
      startTime = Date.now();
      document.getElementById('rec').classList.add('on');
      document.getElementById('st').textContent = '🔴 녹화 중';
      document.getElementById('tm').style.display = 'block';
      document.getElementById('val').textContent = (order.product||'') + ' — ' + (order.supplier||'');
      document.getElementById('lbl').textContent = '운송장: ' + (order.trackingNum||'');
      timerInt = setInterval(updateTimer, 1000);
    }

    var lastMimeType = 'video/webm';
    function stopRec() {
      if (!recorder || recorder.state==='inactive') return;
      lastMimeType = recorder.mimeType || 'video/webm';
      recorder.stop();
      recorder = null;
      clearInterval(timerInt);
      document.getElementById('rec').classList.remove('on');
      document.getElementById('st').textContent = '⏳ 영상 저장 중...';
    }

    function updateTimer() {
      if (!startTime) return;
      var s = Math.floor((Date.now()-startTime)/1000);
      document.getElementById('tm').textContent = String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
    }

    // ── 영상 저장 (Google Drive via Apps Script) ──
    var uploadQueue = [];  // 백그라운드 업로드 큐
    var uploading = false;

    function saveVideo(blob) {
      var ext = lastMimeType.indexOf('mp4') >= 0 ? '.mp4' : '.webm';
      var filename = 'inspection_' + (curOrder?curOrder.trackingNum||'unknown':'unknown')
        + '_' + new Date().toISOString().slice(0,19).replace(/[:.]/g,'-') + ext;
      var sizeMB = (blob.size / 1048576).toFixed(1);

      // 즉시 UI 리셋 → 다음 스캔 가능
      document.getElementById('st').textContent = '📤 백그라운드 업로드 중 (' + sizeMB + 'MB)';
      document.getElementById('sb').textContent = '다음 택배를 처리할 수 있습니다';
      document.getElementById('tm').style.display = 'none';

      // 업로드 큐에 추가
      uploadQueue.push({ blob: blob, filename: filename, order: curOrder });
      curOrder = null;
      processUploadQueue();
    }

    function processUploadQueue() {
      if (uploading || uploadQueue.length === 0) return;
      uploading = true;
      var item = uploadQueue.shift();
      var remaining = uploadQueue.length;

      var reader = new FileReader();
      reader.onload = function() {
        var base64 = reader.result.split(',')[1];
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = APPS_SCRIPT_URL;
        form.target = 'uploadFrame';
        var fields = { action:'uploadVideo', filename:item.filename, data:base64, order:JSON.stringify(item.order||{}) };
        for (var k in fields) {
          var inp = document.createElement('input');
          inp.type = 'hidden'; inp.name = k; inp.value = fields[k];
          form.appendChild(inp);
        }
        var iframe = document.getElementById('uploadFrame');
        if (!iframe) {
          iframe = document.createElement('iframe');
          iframe.id = 'uploadFrame'; iframe.name = 'uploadFrame';
          iframe.style.display = 'none';
          document.body.appendChild(iframe);
        }
        iframe.onload = function() {
          uploading = false;
          document.getElementById('conn').textContent = '● 업로드 완료 (' + item.filename + ')';
          document.getElementById('conn').className = 'conn ok';
          if (uploadQueue.length > 0) {
            document.getElementById('sb').textContent = '업로드 대기 ' + uploadQueue.length + '건';
            processUploadQueue();
          } else {
            document.getElementById('st').textContent = '📹 대기 중';
            document.getElementById('sb').textContent = '✅ 모든 영상 업로드 완료 — AK열 URL 기입됨';
            setTimeout(function() {
              document.getElementById('sb').textContent = 'scan.html에서 운송장 스캔 후 촬영이 자동 시작됩니다';
            }, 3000);
          }
        };
        document.body.appendChild(form);
        form.submit();
        form.remove();
        // 타임아웃: 파일 크기 기반 (1MB당 10초, 최소 30초)
        var timeoutMs = Math.max(30000, Math.round(item.blob.size / 1048576) * 10000);
        setTimeout(function() {
          if (uploading) {
            uploading = false;
            document.getElementById('conn').textContent = '⚠️ 업로드 타임아웃 — 로컬 저장';
            // 로컬 다운로드 폴백
            var a = document.createElement('a');
            a.href = URL.createObjectURL(item.blob);
            a.download = item.filename;
            a.click();
            processUploadQueue();
          }
        }, timeoutMs);
      };
      reader.readAsDataURL(item.blob);
    }

    function resetUI() {
      document.getElementById('st').textContent = '📹 대기 중';
      document.getElementById('sb').textContent = '다음 택배를 기다리는 중...';
      document.getElementById('val').textContent = 'scan.html에서 운송장을 스캔하세요';
      document.getElementById('lbl').textContent = '대기 중';
      curOrder = null;
    }

    // ── 명령 폴링 (시트6 A1 via Apps Script GET) ──
    function poll() {
      fetch(APPS_SCRIPT_URL + '?action=getCommand')
        .then(function(r) { return r.text(); })
        .then(function(text) {
          try {
            var cmd = JSON.parse(text);
            if (cmd.action === 'start' && !recorder) {
              startRec(cmd);
              // 명령 클리어
              fetch(APPS_SCRIPT_URL + '?action=clearCommand');
            } else if (cmd.action === 'stop' && recorder) {
              stopRec();
              fetch(APPS_SCRIPT_URL + '?action=clearCommand');
            }
          } catch(e) {}
        })
        .catch(function() {});
    }

    // ── 시작 ──
    initCamera();
    setInterval(poll, 1500);  // 1.5초 간격 폴링 (촬영 시작 딜레이 최소화)
  </script>
</body>
</html>
